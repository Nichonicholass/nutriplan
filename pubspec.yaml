name: nutriplan_ai
description: "NutriPlan AI - AI-powered personalized meal planning app"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Local Storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # On-device AI (Edge Computing)
  google_mlkit_image_labeling: ^0.11.0
  image_picker: ^1.1.2
  permission_handler: ^11.3.1

  # UI & Animations
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.2.0
  
  # Utils
  intl: ^0.19.0
  uuid: ^4.5.1
  path_provider: ^2.1.5
  shared_preferences: ^2.3.4

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.14

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
        - asset: assets/fonts/Nunito-Medium.ttf
          weight: 500
        - asset: assets/fonts/Nunito-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
        - asset: assets/fonts/Nunito-ExtraBold.ttf
          weight: 800
